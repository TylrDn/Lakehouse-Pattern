<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'JetBrains Mono','Fira Code','Menlo','SFMono-Regular',Consolas,monospace" font-size="14">
  <defs>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- window chrome -->
  <rect x="0" y="0" width="900" height="540" rx="10" fill="#1e1e1e"/>
  <rect x="0" y="0" width="900" height="30" rx="10" fill="url(#titlebar)"/>
  <rect x="0" y="20" width="900" height="10" fill="url(#titlebar)"/>
  <circle cx="20" cy="15" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="15" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="15" r="6" fill="#27c93f"/>
  <text x="450" y="20" fill="#c0c0c0" text-anchor="middle" font-size="12">lakehouse-pattern — make dag</text>

  <!-- terminal body -->
  <g transform="translate(16, 55)" fill="#d4d4d4">
    <!-- Line 1: prompt + command -->
    <text y="0"><tspan fill="#4ec9b0">$</tspan> <tspan fill="#dcdcaa">make</tspan> preflight</text>

    <!-- Line 2 -->
    <text y="22" fill="#9cdcfe">python -m lakehouse.env</text>

    <!-- Line 3 -->
    <text y="44"><tspan fill="#808080">[2026-07-03T21:24:30Z </tspan><tspan fill="#4ec9b0">INFO</tspan><tspan fill="#808080"> env] </tspan><tspan fill="#d4d4d4">Prerequisites OK.</tspan></text>

    <!-- Line 4: blank -->

    <!-- Line 5: next command -->
    <text y="88"><tspan fill="#4ec9b0">$</tspan> <tspan fill="#dcdcaa">make</tspan> dag</text>

    <!-- Line 6 -->
    <text y="110" fill="#9cdcfe">python -m orchestration.workflow</text>

    <!-- DAG output -->
    <text y="132"><tspan fill="#808080">[2026-07-03T21:24:35Z </tspan><tspan fill="#4ec9b0">INFO</tspan><tspan fill="#808080"> workflow] </tspan><tspan fill="#569cd6">DAG start</tspan> — 6 tasks queued</text>
    <text y="154"><tspan fill="#808080">[2026-07-03T21:24:38Z </tspan><tspan fill="#4ec9b0">INFO</tspan><tspan fill="#808080"> ingest]   </tspan>bronze  <tspan fill="#4ec9b0">✓</tspan> 5000 rows appended</text>
    <text y="176"><tspan fill="#808080">[2026-07-03T21:24:47Z </tspan><tspan fill="#4ec9b0">INFO</tspan><tspan fill="#808080"> silver]   </tspan>silver  <tspan fill="#4ec9b0">✓</tspan> MERGE + Z-ORDER on customer_id</text>
    <text y="198"><tspan fill="#808080">[2026-07-03T21:24:58Z </tspan><tspan fill="#4ec9b0">INFO</tspan><tspan fill="#808080"> gold]     </tspan>gold    <tspan fill="#4ec9b0">✓</tspan> daily_revenue, customer_ltv</text>
    <text y="220"><tspan fill="#808080">[2026-07-03T21:25:12Z </tspan><tspan fill="#4ec9b0">INFO</tspan><tspan fill="#808080"> ml]       </tspan>mlflow  <tspan fill="#4ec9b0">✓</tspan> run logged (MAE=1369.54, R²=0.080)</text>
    <text y="242"><tspan fill="#808080">[2026-07-03T21:25:14Z </tspan><tspan fill="#4ec9b0">INFO</tspan><tspan fill="#808080"> ml]       </tspan>registry <tspan fill="#4ec9b0">✓</tspan> daily_revenue_forecaster v1 → Staging</text>
    <text y="264"><tspan fill="#808080">[2026-07-03T21:25:20Z </tspan><tspan fill="#4ec9b0">INFO</tspan><tspan fill="#808080"> workflow] </tspan><tspan fill="#569cd6">DAG complete</tspan> in 85s — 6/6 tasks OK</text>

    <!-- blank line -->

    <!-- Line 12 -->
    <text y="308"><tspan fill="#4ec9b0">$</tspan> <tspan fill="#dcdcaa">make</tspan> serve</text>
    <text y="330" fill="#9cdcfe">streamlit run serving/app.py</text>
    <text y="352"><tspan fill="#808080">  You can now view your Streamlit app in your browser.</tspan></text>
    <text y="374"><tspan fill="#808080">  Local URL:  </tspan><tspan fill="#4ec9b0">http://localhost:8501</tspan></text>

    <!-- prompt -->
    <text y="418"><tspan fill="#4ec9b0">$</tspan> <tspan fill="#d4d4d4" font-family="monospace">▊</tspan></text>
  </g>
</svg>
