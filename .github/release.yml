# Configuration for auto-generated release notes.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
    authors:
      - dependabot
  categories:
    - title: Breaking changes
      labels:
        - breaking
        - major
    - title: New features
      labels:
        - enhancement
        - feature
    - title: Bug fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: CI & tooling
      labels:
        - ci
        - tooling
    - title: Other changes
      labels:
        - "*"
