name: ci

on:
  # Run on pushes to ANY branch so feature branches (incl. stacked PRs whose
  # base is not main) get a trustworthy signal before merge. Without this, only
  # PRs targeting main were ever tested.
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is primary. 3.12 is under investigation: pyspark 3.5.x can be
        # flaky on 3.12 — if this leg fails, drop it and scope the README badge
        # to 3.11 (see P1-6).
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Java (required by PySpark)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep the PR-gating footprint small — heavy ML deps (mlflow, torch,
          # sentence-transformers, chromadb) install slowly and are exercised
          # in the nightly job via `make ml` / `make rag`. requirements-ci.txt
          # is a strict subset of requirements.txt with IDENTICAL pins
          # (enforced by tests/test_requirements_ci.py) so CI tests the
          # shipped stack.
          pip install -r requirements-ci.txt

      - name: Editable install + import smoke (P0-3)
        # Verifies the package is installable and its modules import from an
        # arbitrary CWD. --no-deps keeps the fast lane fast (deps already
        # installed above); running from $RUNNER_TEMP proves imports don't
        # depend on being in the repo root.
        run: |
          pip install -e . --no-deps
          cd "$RUNNER_TEMP"
          python -c "import lakehouse, ingestion, transform, ml, orchestration, pipelines, serving; print('imports OK')"

      - name: Lint
        run: ruff check .

      - name: Run tests
        env:
          PYSPARK_PYTHON: python
          # Explicitly point PySpark at the Java installed above so the
          # preflight in lakehouse.env sees the right runtime.
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        # Coverage is measured and printed but NOT gated this sprint (no
        # --cov-fail-under) so it can't block the launch; raise a threshold
        # post-launch. Note the fast lane excludes rag/mlflow + ml paths, so
        # the number is a floor, not the full picture (nightly covers the rest).
        run: pytest -q -k "not rag and not mlflow" --cov=. --cov-report=term-missing --cov-report=xml

      - name: Smoke-test the ETL DAG
        env:
          PYSPARK_PYTHON: python
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: python -m orchestration.workflow --skip-ml
