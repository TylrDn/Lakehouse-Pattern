name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Java (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep the PR-gating footprint small — heavy ML deps (mlflow, torch,
          # sentence-transformers, chromadb) install slowly and are exercised
          # in the nightly job via `make ml` / `make rag`. requirements-ci.txt
          # is a strict subset of requirements.txt with IDENTICAL pins
          # (enforced by tests/test_requirements_ci.py) so CI tests the
          # shipped stack.
          pip install -r requirements-ci.txt

      - name: Lint
        run: ruff check .

      - name: Run tests
        env:
          PYSPARK_PYTHON: python
          # Explicitly point PySpark at the Java installed above so the
          # preflight in lakehouse.env sees the right runtime.
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: pytest -q -k "not rag and not mlflow"

      - name: Smoke-test the ETL DAG
        env:
          PYSPARK_PYTHON: python
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: python -m orchestration.workflow --skip-ml
