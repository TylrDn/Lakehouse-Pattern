name: nightly

# The PR-gating `ci` workflow deliberately runs a fast, Spark-only subset
# (`-k "not rag and not mlflow"` + `--skip-ml`) so it never installs the heavy
# ML stack (mlflow, torch, sentence-transformers, chromadb). That means a green
# PR check does NOT exercise ML / RAG / serving. This workflow closes that gap:
# it installs the full requirements.txt and smoke-tests `make ml` + `make rag`
# plus the full test suite (including any @slow-marked tests).
#
# Runs on a schedule and on-demand via `workflow_dispatch` (Actions tab ->
# "nightly" -> "Run workflow"), so ML-touching branches can be verified before
# merge without waiting for the scheduled run.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Java (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install the full shipped stack
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Full test suite (includes @slow)
        env:
          PYSPARK_PYTHON: python
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: pytest -q

      - name: Smoke-test ML train + register
        env:
          PYSPARK_PYTHON: python
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: make ml

      - name: Smoke-test RAG index build + query
        env:
          PYSPARK_PYTHON: python
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: make rag
