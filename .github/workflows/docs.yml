name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - "TROUBLESHOOTING.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install \
            "mkdocs-material==9.5.39" \
            "pymdown-extensions==10.11.2" \
            "mkdocs-autorefs==1.2.0"

      - name: Mirror root docs into docs/
        run: python docs/prebuild.py

      - name: Build site
        # We don't pass --strict because TROUBLESHOOTING.md's TOC uses
        # GitHub-style anchors that render correctly on github.com but
        # get slugified differently by pymdownx. The links still work on
        # GitHub; the docs site relies on MkDocs Material's built-in TOC.
        run: mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
